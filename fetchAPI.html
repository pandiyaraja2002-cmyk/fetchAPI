<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="output" style="white-space:pre;"></div>
    <button onclick="getData()">CLICK</button>
    <script>
        async function getData (){
            const output = document.getElementById("output");
            output.textContent= "Fetching data from API with fetch()...\n";
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/todos')

                if(response.ok){
                    const data = await response.json();
                   output.textContent = "API data (using try......catch):\n" + JSON.stringify(data, null, 2);
                }else{
                     output.textContent=`server respond with status :${response.status}`;
                }
            } catch(error){

                    output.textContent = "Error (catch by block)"+ error;
                }
                finally {
                    output.textContent += "\n\n---\n operation completed (finally blocked).";
                }
            }
        </script>

        
</body>
</html>
